name: Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: ["main", "master"]
  workflow_dispatch:
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      # 1) Isometric commit calendar
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}

          filename: svg/metrics.plugin.isocalendar.svg
          base: ""

          plugin_isocalendar: yes

      # 2) Comment reactions
      - uses: lowlighter/metrics@latest
        with:
          filename: svg/metrics.plugin.reactions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_reactions: yes
          plugin_reactions_limit: 100
          plugin_reactions_details: percentage

      # 3) Wakatime
      - uses: lowlighter/metrics@latest
        with:
          filename: svg/metrics.plugin.wakatime.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_wakatime: yes
          plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}

      # 4) Languages activity
      - uses: lowlighter/metrics@latest
        with:
          filename: svg/metrics.plugin.languages.indepth.svg
          token: ${{ secrets.METRICS_TOKEN }}
          base: ""
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_details: lines, bytes-size
          plugin_languages_limit: 8
          plugin_languages_ignored: vendor, node_modules, .husky, .github, tex, less, dockerfile, makefile, qmake, lex, cmake, shell, gnuplot
          plugin_languages_analysis_timeout: 30
          plugin_languages_analysis_timeout_repositories: 60

          commits_authoring: |
            Bui Minh Quan,
            minhquan2904@outlook.com,
            quanbm@users.noreply.github.com

      # Commit
      - name: Commit generated metrics
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "chore: update metrics"
          file_pattern: "svg/*.svg"
